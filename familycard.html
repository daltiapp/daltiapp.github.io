<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>가계도/페디그리 트리 데모 (SVG + D3)</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255,255,255,0.08);
      --text: #e5e7eb;
      --muted: rgba(229,231,235,0.65);
      --link: rgba(229,231,235,0.25);
      --border: rgba(229,231,235,0.25);
      --border-strong: rgba(96,165,250,0.9);
    }
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    }
    #app { position: relative; height: 100%; width: 100%; }
    #toolbar {
      position: absolute;
      top: env(safe-area-inset-top, 12px);
      left: env(safe-area-inset-left, 12px);
      right: env(safe-area-inset-right, 12px);
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      z-index: 10;
      flex-wrap: wrap;
    }
    #toolbar button {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    #toolbar button:active { transform: translateY(1px); }
    #toolbar .hint {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    #tree { height: 100%; width: 100%; }

    .link { fill: none; stroke: var(--link); stroke-width: 2; }
    .node-border {
      fill: rgba(17,24,39,0.9);
      stroke: var(--border);
      stroke-width: 2;
    }
    .node-border.has-children { stroke: var(--border-strong); }
    .node-border.selected { stroke: #60a5fa; stroke-width: 3; }
    .label {
      fill: var(--text);
      font-size: 12px;
      font-weight: 700;
      paint-order: stroke;
      stroke: rgba(0,0,0,0.35);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .type-badge { font-size: 14px; pointer-events: none; opacity: 0.9; }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <button id="fitBtn">화면맞춤</button>
      <button id="saveBtn">현재 트리 저장</button>
      <button id="layoutBtn">보기: 상하 보기</button>
      <button id="addBtn">선택 노드에 자식 추가</button>
      <button id="removeBtn">선택 노드 삭제</button>
      <button id="undoBtn" disabled>되돌리기</button>
      <button id="downloadBtn">JSON 다운로드</button>
      <button id="importBtn">JSON 불러오기</button>
      <button id="clearLocalBtn">로컬 저장 초기화</button>
      <button id="resetBtn">초기화</button>
      <span id="status" class="hint">📱 핀치줌/드래그로 이동 · 노드 클릭: 선택/접기·펼치기 · 더블클릭: 이름 수정</span>
    </div>
    <div id="tree"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

  <script>
    const STORAGE_KEY = "familycard:data:v1";
    const AUTOSAVE_DELAY_MS = 700;
    const HISTORY_LIMIT = 30;

    // --- 1) 샘플용 "사진" (data:image/svg+xml) 생성 ---
    function avatarDataUri(label, hue) {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="hsl(${hue} 80% 55%)"/>
              <stop offset="1" stop-color="hsl(${(hue + 40) % 360} 80% 45%)"/>
            </linearGradient>
          </defs>
          <rect width="120" height="120" rx="60" fill="url(#g)"/>
          <text x="60" y="72" font-size="54" text-anchor="middle"
                font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
                fill="rgba(255,255,255,0.95)" font-weight="800">${label}</text>
        </svg>`;
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg.trim());
    }

    const placeholder = avatarDataUri("?", 210);

    // --- 2) 기본 트리 데이터 ---
    const defaultData = {
      id: "root",
      type: "group",
      name: "우리 가족 & 반려견",
      photo: avatarDataUri("家", 190),
      children: [
        {
          id: "p1",
          type: "human",
          name: "김민수",
          photo: avatarDataUri("M", 30),
          children: [
            {
              id: "p1c1",
              type: "human",
              name: "김하늘",
              photo: avatarDataUri("H", 120),
              children: []
            },
            {
              id: "dog1",
              type: "dog",
              name: "보리",
              photo: avatarDataUri("🐶", 55),
              children: [
                {
                  id: "dog1c1",
                  type: "dog",
                  name: "보리 2세",
                  photo: avatarDataUri("🐾", 85),
                  children: []
                }
              ]
            }
          ]
        },
        {
          id: "p2",
          type: "human",
          name: "이서연",
          photo: avatarDataUri("S", 260),
          children: []
        }
      ]
    };

    function cloneData(source) {
      return JSON.parse(JSON.stringify(source));
    }

    function normalizePayload(parsed) {
      if (!parsed || typeof parsed !== "object") return null;
      if (parsed.tree && parsed.tree.id) return parsed;
      if (parsed.id) {
        return { version: 1, layoutMode: "vertical", tree: parsed };
      }
      return null;
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return cloneData(defaultData);
        const payload = normalizePayload(JSON.parse(raw));
        if (!payload) return cloneData(defaultData);
        layoutMode = payload.layoutMode || "vertical";
        return payload.tree;
      } catch (e) {
        console.warn("저장 데이터를 읽지 못해 기본값을 사용합니다.", e);
        return cloneData(defaultData);
      }
    }

    function saveData(tree) {
      const data = treeToObject(tree || root);
      const payload = { version: 2, layoutMode, tree: data };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      setStatus("저장됨");
      return data;
    }

    function markDirty() {
      isDirty = true;
      setStatus("수정됨 · 자동저장 대기중");
      if (autoSaveTimer) {
        clearTimeout(autoSaveTimer);
      }
      autoSaveTimer = setTimeout(() => {
        if (!isDirty) return;
        saveData(root);
        isDirty = false;
      }, AUTOSAVE_DELAY_MS);
    }

    function flushAutoSave() {
      if (!isDirty) return;
      if (autoSaveTimer) {
        clearTimeout(autoSaveTimer);
        autoSaveTimer = null;
      }
      saveData(root);
      isDirty = false;
    }

    function treeToObject(treeNode) {
      const walk = (node) => {
        const result = {
          id: node.data.id,
          type: node.data.type,
          name: node.data.name,
          photo: node.data.photo,
          children: []
        };
      
        const list = node.children || [];
        for (const c of list) {
          result.children.push(walk(c));
        }
        return result;
      };
      return walk(treeNode);
    }

    function setStatus(text) {
      document.getElementById("status").textContent = `${text} · 📱 핀치줌/드래그로 이동 · 노드 클릭: 접기/펼치기 · 더블클릭: 이름 수정`;
    }

    function updateUndoState() {
      const undoBtn = document.getElementById("undoBtn");
      if (undoBtn) undoBtn.disabled = history.length === 0;
    }

    function pushHistory() {
      history.push(JSON.stringify(treeToObject(root)));
      if (history.length > HISTORY_LIMIT) history.shift();
      updateUndoState();
    }

    function undoHistory() {
      if (history.length === 0) return;
      const prev = JSON.parse(history.pop());
      data = prev;
      replaceTree(prev, true);
      isDirty = true;
      markDirty();
      setStatus("이전 상태로 되돌렸습니다");
      updateUndoState();
    }

    function findNode(source, targetId) {
      if (!source) return null;
      if (source.id === targetId) return source;
      if (!Array.isArray(source.children)) return null;
      for (const child of source.children) {
        const found = findNode(child, targetId);
        if (found) return found;
      }
      return null;
    }

    function addChildToSelected() {
      const currentTree = treeToObject(root);
      const parentId = selectedNodeId || defaultData.id;
      const parent = findNode(currentTree, parentId);
      if (!parent) {
        alert("선택된 노드를 찾을 수 없습니다.");
        return;
      }

      const name = prompt("새 노드 이름", "새 멤버");
      if (!name || !name.trim()) return;

      const rawType = prompt("타입을 입력하세요 (human / dog / group)", "human");
      const type = (rawType || "human").trim().toLowerCase() || "human";

      const label = prompt("표시 텍스트 (1~2자 권장)", "N");
      const safeLabel = (label || "N").trim().slice(0, 2) || "N";

      const nextColor = Math.floor(Math.random() * 360);

      parent.children = parent.children || [];
      parent.children.push({
        id: `n_${Date.now()}_${Math.floor(Math.random() * 1000)}`,
        type,
        name: name.trim(),
        photo: avatarDataUri(safeLabel, nextColor),
        children: []
      });

      pushHistory();
      data = currentTree;
      replaceTree(currentTree, false);
      selectedNodeId = parent.id;
      markDirty();
      setStatus("노드 추가됨");
    }

    function removeNodeById(source, targetId) {
      if (!source || source.id === targetId) return false;
      if (!Array.isArray(source.children)) return false;

      let removed = false;
      source.children = source.children.filter((child) => {
        if (child.id === targetId) {
          removed = true;
          return false;
        }
        return true;
      });

      if (removed) return true;

      for (const child of source.children) {
        removed = removeNodeById(child, targetId) || removed;
      }

      return removed;
    }

    function removeSelectedNode() {
      if (!selectedNodeId || selectedNodeId === defaultData.id) {
        alert("루트는 삭제할 수 없습니다.");
        return;
      }
      const next = treeToObject(root);
      const removed = removeNodeById(next, selectedNodeId);
      if (!removed) {
        alert("삭제할 노드를 찾지 못했습니다.");
        return;
      }
      pushHistory();
      data = next;
      selectedNodeId = defaultData.id;
      replaceTree(next, false);
      markDirty();
      setStatus("선택 노드 삭제됨");
    }

    function downloadJson() {
      const payload = getPersistPayload(root);
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "familycard.json";
      a.click();
      URL.revokeObjectURL(url);
      setStatus("JSON 다운로드됨");
    }

    let data = loadData();
    let autoSaveTimer = null;
    let isDirty = false;
    let selectedNodeId = defaultData.id;
    let history = [];

    // --- 3) D3 + SVG 렌더러 ---
    const container = document.getElementById("tree");
    const svg = d3.select(container).append("svg")
      .attr("width", container.clientWidth)
      .attr("height", container.clientHeight)
      .style("touch-action", "none");

    const viewport = svg.append("g").attr("class", "viewport");

    const zoom = d3.zoom()
      .scaleExtent([0.25, 3])
      .on("zoom", (event) => viewport.attr("transform", event.transform));

    svg.call(zoom).on("dblclick.zoom", null);

    const NODE_R = 28;
    const NODE_GAP_X = 90;
    const NODE_GAP_Y = 170;
    const LAYOUT_LABELS = {
      horizontal: "좌우 보기",
      vertical: "상하 보기"
    };
    let layoutMode = "vertical";

    let root = d3.hierarchy(data);
    root.x0 = 0;
    root.y0 = 0;

    function nodeKey(d) {
      return String(d.data.id).replace(/[^a-zA-Z0-9_-]/g, "_");
    }

    function getPoint(d) {
      if (layoutMode === "vertical") {
        return { x: d.x, y: d.y };
      }
      return { x: d.y, y: d.x };
    }

    function truncate(s, n) {
      if (!s) return "";
      return s.length > n ? s.slice(0, n - 1) + "…" : s;
    }

    function diagonal(link) {
      const s = getPoint(link.source), t = getPoint(link.target);
      if (layoutMode === "vertical") {
        return `M${s.x},${s.y}
                C${s.x},${(s.y + t.y) / 2}
                 ${t.x},${(s.y + t.y) / 2}
                 ${t.x},${t.y}`;
      }
      return `M${s.x},${s.y}
              C${(s.x + t.x) / 2},${s.y}
               ${(s.x + t.x) / 2},${t.y}
               ${t.x},${t.y}`;
    }

    function toggle(d) {
      if (d.children) {
        d._children = d.children;
        d.children = null;
      } else {
        d.children = d._children;
        d._children = null;
      }
    }

    function editNodeName(d) {
      const next = prompt("이름을 수정하세요", d.data.name);
      if (next === null) return;
      d.data.name = next.trim() || d.data.name;
      update(d);
      markDirty();
    }

    function update(source) {
      const width = container.clientWidth;
      const height = container.clientHeight;
      svg.attr("width", width).attr("height", height);

      const layout = d3.tree().nodeSize([NODE_GAP_X, NODE_GAP_Y]);
      layout(root);

      const nodes = root.descendants();
      const links = root.links();

      const minAxis = d3.min(nodes, d => getPoint(d).x);
      nodes.forEach((d) => {
        const p = getPoint(d);
        d._viewX = p.x - minAxis + 60;
        d._viewY = p.y + 60;
      });

      const linkSel = viewport.selectAll("path.link").data(links, d => nodeKey(d.target));
      linkSel.enter()
        .append("path")
        .attr("class", "link")
        .attr("d", () => {
          const p = getPoint(source);
          return `M${p.x},${p.y} C${p.x},${p.y} ${p.x},${p.y} ${p.x},${p.y}`;
        })
        .merge(linkSel)
        .transition().duration(350)
        .attr("d", diagonal);

      linkSel.exit()
        .transition().duration(350)
        .attr("d", () => diagonal({ source: { x: source.x, y: source.y }, target: { x: source.x, y: source.y } }))
        .remove();

      const nodeSel = viewport.selectAll("g.node").data(nodes, d => nodeKey(d));
      const nodeEnter = nodeSel.enter()
        .append("g")
        .attr("class", "node")
        .attr("transform", () => `translate(${(getPoint(source).x || 0) + 0},${(getPoint(source).y || 0) + 0})`)
        .on("click", (event, d) => {
          // 더블클릭이 동작하면 click이 2번 발생하므로, 2번째 이벤트는 건너뜀
          if (event.detail >= 2) return;
          selectedNodeId = d.data.id;
          setStatus(`선택: ${d.data.name}`);
          toggle(d);
          update(d);
          event.stopPropagation();
        })
        .on("dblclick", (event, d) => {
          event.preventDefault();
          editNodeName(d);
          event.stopPropagation();
        });

      nodeEnter.append("circle")
        .attr("class", "node-border")
        .attr("r", NODE_R + 2);

      const defs = nodeEnter.append("defs");
      defs.append("clipPath")
        .attr("id", d => `clip-${nodeKey(d)}`)
        .append("circle")
        .attr("r", NODE_R)
        .attr("cx", 0)
        .attr("cy", 0);

      nodeEnter.append("image")
        .attr("x", -NODE_R)
        .attr("y", -NODE_R)
        .attr("width", NODE_R * 2)
        .attr("height", NODE_R * 2)
        .attr("href", d => d.data.photo || placeholder)
        .attr("clip-path", d => `url(#clip-${nodeKey(d)})`)
        .each(function (d) {
          if (!d.data.photo) d3.select(this).attr("href", placeholder);
        });

      nodeEnter.append("text")
        .attr("class", "label")
        .attr("text-anchor", "middle")
        .attr("dy", NODE_R + 18)
        .text(d => truncate(d.data.name, 12));

      nodeEnter.append("text")
        .attr("class", "type-badge")
        .attr("x", NODE_R + 6)
        .attr("y", -NODE_R + 12)
        .text(d => d.data.type === "dog" ? "🐶" : (d.data.type === "human" ? "👤" : "🌳"));

      const nodeUpdate = nodeEnter.merge(nodeSel);
      nodeUpdate.transition().duration(350)
        .attr("transform", d => `translate(${d._viewX},${d._viewY})`);

      nodeUpdate.select("circle.node-border")
        .classed("has-children", d => !!(d.children || d._children))
        .classed("selected", d => d.data.id === selectedNodeId);

      nodeSel.exit()
        .transition().duration(350)
        .attr("transform", `translate(${getPoint(source).x},${getPoint(source).y})`)
        .remove();

      nodes.forEach(d => {
        const p = getPoint(d);
        d.x0 = p.x;
        d.y0 = p.y;
      });
    }

    function toggleLayout() {
      layoutMode = layoutMode === "horizontal" ? "vertical" : "horizontal";
      updateLayoutButtonText();
      setStatus(`${layoutMode === "horizontal" ? "좌우" : "상하"} 보기`);
      update(root);
      fitToScreen();
      markDirty();
    }

    function updateLayoutButtonText() {
      const btn = document.getElementById("layoutBtn");
      if (!btn) return;
      const next = layoutMode === "horizontal" ? "vertical" : "horizontal";
      btn.textContent = `보기: ${LAYOUT_LABELS[next]}`;
    }

    function fitToScreen() {
      const gNode = viewport.node();
      if (!gNode) return;

      const bbox = gNode.getBBox();
      const width = container.clientWidth;
      const height = container.clientHeight;
      if (bbox.width === 0 || bbox.height === 0) return;

      const scale = Math.min(3, Math.max(0.25, 0.92 / Math.max(bbox.width / width, bbox.height / height)));
      const tx = (width - bbox.width * scale) / 2 - bbox.x * scale;
      const ty = (height - bbox.height * scale) / 2 - bbox.y * scale;

      svg.transition().duration(350)
        .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }

    function replaceTree(nextData, keepDirty = false) {
      root = d3.hierarchy(nextData);
      root.x0 = 0;
      root.y0 = 0;
      update(root);
      fitToScreen();
      isDirty = keepDirty ? isDirty : false;
      if (autoSaveTimer) {
        clearTimeout(autoSaveTimer);
        autoSaveTimer = null;
      }
    }

    document.getElementById("fitBtn").addEventListener("click", fitToScreen);
    document.getElementById("layoutBtn").addEventListener("click", toggleLayout);
    document.getElementById("addBtn").addEventListener("click", addChildToSelected);
    document.getElementById("removeBtn").addEventListener("click", removeSelectedNode);
    document.getElementById("undoBtn").addEventListener("click", undoHistory);
    document.getElementById("saveBtn").addEventListener("click", () => saveData(root));
    document.getElementById("downloadBtn").addEventListener("click", downloadJson);
    document.getElementById("importBtn").addEventListener("click", () => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = ".json,application/json";
      input.onchange = () => {
        const file = input.files && input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const parsed = normalizePayload(JSON.parse(String(e.target?.result || "{}")));
            if (!parsed) throw new Error("invalid payload");
            history = [];
            layoutMode = parsed.layoutMode || "vertical";
            updateLayoutButtonText();
            replaceTree(parsed.tree);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
            isDirty = false;
            if (autoSaveTimer) {
              clearTimeout(autoSaveTimer);
              autoSaveTimer = null;
            }
            setStatus("JSON 불러옴");
          } catch {
            alert("JSON 형식이 올바르지 않습니다.");
          }
        };
        reader.readAsText(file);
      };
      input.click();
    });
    document.getElementById("clearLocalBtn").addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      history = [];
      data = cloneData(defaultData);
      replaceTree(data);
      layoutMode = "vertical";
      updateLayoutButtonText();
      isDirty = false;
      if (autoSaveTimer) {
        clearTimeout(autoSaveTimer);
        autoSaveTimer = null;
      }
      setStatus("로컬 저장소 초기화됨");
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      svg.transition().duration(350).call(zoom.transform, d3.zoomIdentity);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key.toLowerCase() !== "v") return;
      const tag = event.target && event.target.tagName ? event.target.tagName.toLowerCase() : "";
      if (tag === "input" || tag === "textarea" || tag === "select") return;
      event.preventDefault();
      toggleLayout();
    });

    updateLayoutButtonText();
    update(root);
    setTimeout(fitToScreen, 0);

    window.addEventListener("resize", () => {
      update(root);
      fitToScreen();
    });

    window.addEventListener("click", () => {
      if (data && data.id === "root") {
        selectedNodeId = data.id;
      }
    });

    window.addEventListener("beforeunload", () => {
      flushAutoSave();
    });

    updateUndoState();
  </script>
</body>
</html>
