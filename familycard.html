<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>가계도/페디그리 트리 데모 (SVG + D3)</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255,255,255,0.08);
      --text: #e5e7eb;
      --muted: rgba(229,231,235,0.65);
      --link: rgba(229,231,235,0.25);
      --border: rgba(229,231,235,0.25);
      --border-strong: rgba(96,165,250,0.9);
    }
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    }
    #app { position: relative; height: 100%; width: 100%; }
    #toolbar {
      position: absolute;
      top: env(safe-area-inset-top, 12px);
      left: env(safe-area-inset-left, 12px);
      right: env(safe-area-inset-right, 12px);
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      z-index: 10;
      flex-wrap: wrap;
    }
    #toolbar button {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    #toolbar button:active { transform: translateY(1px); }
    #toolbar .hint {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    #tree { height: 100%; width: 100%; }

    .link { fill: none; stroke: var(--link); stroke-width: 2; }
    .node-border {
      fill: rgba(17,24,39,0.9);
      stroke: var(--border);
      stroke-width: 2;
    }
    .node-border.has-children { stroke: var(--border-strong); }
    .node-border.selected { stroke: #60a5fa; stroke-width: 3; }
    .label {
      fill: var(--text);
      font-size: 12px;
      font-weight: 700;
      paint-order: stroke;
      stroke: rgba(0,0,0,0.35);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .gender-badge { pointer-events: none; }
    .gender-badge-bg { stroke-width: 1.5; }
    .gender-badge-text {
      fill: #f8fafc;
      font-size: 12px;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: central;
      font-family: "Apple Symbols","Segoe UI Symbol","Noto Sans Symbols 2","Arial Unicode MS",sans-serif;
    }
    .action-btn-bg { fill: #0f172a; stroke: #93c5fd; stroke-width: 1; }
    .action-btn-text { fill: #e2e8f0; font-size: 11px; font-weight: 700; pointer-events: none; text-anchor: middle; dominant-baseline: central; }
    .node .action { cursor: pointer; opacity: 0.2; transition: opacity 0.2s ease; }
    .node.selected .action { opacity: 1; }
    .node .action.hidden { display: none; }
    .hidden { display: none !important; }
    .node-form-backdrop {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(11,16,32,0.72);
      backdrop-filter: blur(12px);
      z-index: 20;
    }
    .node-form-card {
      width: min(420px, 100%);
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(15,23,42,0.96);
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    }
    .node-form-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 800;
    }
    .node-form-grid {
      display: grid;
      gap: 12px;
    }
    .node-form-field {
      display: grid;
      gap: 6px;
    }
    .node-form-field span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .node-form-field input,
    .node-form-field select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 11px 12px;
      font: inherit;
    }
    .node-form-field input:focus,
    .node-form-field select:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.18);
    }
    .node-form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }
    .node-form-actions button {
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }
    .node-form-actions button[type="submit"] {
      background: linear-gradient(135deg, rgba(59,130,246,0.95), rgba(37,99,235,0.92));
      border-color: rgba(147,197,253,0.8);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <button id="fitBtn">전체 보기</button>
      <button id="saveBtn">지금 저장</button>
      <button id="layoutBtn">방향: 상하</button>
      <button id="addBtn">자식 추가</button>
      <button id="removeBtn">선택 삭제</button>
      <button id="uploadBtn">사진 변경</button>
      <button id="undoBtn" disabled>되돌리기</button>
      <button id="downloadBtn">백업 저장</button>
      <button id="importBtn">백업 불러오기</button>
      <button id="clearLocalBtn">저장 초기화</button>
      <button id="resetBtn">보기 초기화</button>
      <span id="status" class="hint">📱 핀치줌/드래그로 이동 · 노드 클릭: 선택/접기·펼치기 · 더블클릭: 정보 수정</span>
    </div>
    <div id="tree"></div>
    <div id="nodeFormBackdrop" class="node-form-backdrop hidden">
      <form id="nodeForm" class="node-form-card">
        <h2 id="nodeFormTitle" class="node-form-title">노드 정보</h2>
        <div class="node-form-grid">
          <label class="node-form-field">
            <span>이름</span>
            <input id="nodeFormName" type="text" maxlength="30" autocomplete="off" />
          </label>
          <label id="nodeFormTypeField" class="node-form-field">
            <span>타입</span>
            <select id="nodeFormType">
              <option value="human">사람</option>
              <option value="dog">반려동물</option>
              <option value="group">그룹</option>
            </select>
          </label>
          <label id="nodeFormGenderField" class="node-form-field">
            <span>성별</span>
            <select id="nodeFormGender">
              <option value="M">남</option>
              <option value="F">여</option>
              <option value="X">기타</option>
              <option value="">없음</option>
            </select>
          </label>
          <label id="nodeFormLabelField" class="node-form-field">
            <span>라벨</span>
            <input id="nodeFormLabel" type="text" maxlength="2" autocomplete="off" />
          </label>
        </div>
        <div class="node-form-actions">
          <button id="nodeFormCancel" type="button">취소</button>
          <button id="nodeFormSubmit" type="submit">확인</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

  <script>
    const STORAGE_KEY = "familycard:data:v1";
    const AUTOSAVE_DELAY_MS = 700;
    const HISTORY_LIMIT = 30;
    const CLICK_TOGGLE_DELAY = 180;
    const MAX_STORAGE_TRY = 3;
    let layoutMode = "vertical";

    // --- 1) 샘플용 "사진" (data:image/svg+xml) 생성 ---
    function avatarDataUri(label, hue) {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="hsl(${hue} 80% 55%)"/>
              <stop offset="1" stop-color="hsl(${(hue + 40) % 360} 80% 45%)"/>
            </linearGradient>
          </defs>
          <rect width="120" height="120" rx="60" fill="url(#g)"/>
          <text x="60" y="72" font-size="54" text-anchor="middle"
                font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
                fill="rgba(255,255,255,0.95)" font-weight="800">${label}</text>
        </svg>`;
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg.trim());
    }

    const placeholder = avatarDataUri("?", 210);

    // --- 2) 기본 트리 데이터 ---
    const defaultData = {
      id: "root",
      type: "group",
      name: "우리 가족 & 반려견",
      photo: avatarDataUri("家", 190),
      children: [
        {
          id: "p1",
          type: "human",
          gender: "M",
          name: "김민수",
          photo: avatarDataUri("M", 30),
          children: [
            {
              id: "p1c1",
              type: "human",
              gender: "F",
              name: "김하늘",
              photo: avatarDataUri("H", 120),
              children: []
            },
            {
              id: "dog1",
              type: "dog",
              gender: "",
              name: "보리",
              photo: avatarDataUri("🐶", 55),
              children: [
                {
                  id: "dog1c1",
                  type: "dog",
                  gender: "",
                  name: "보리 2세",
                  photo: avatarDataUri("🐾", 85),
                  children: []
                }
              ]
            }
          ]
        },
        {
          id: "p2",
          type: "human",
          gender: "F",
          name: "이서연",
          photo: avatarDataUri("S", 260),
          children: []
        }
      ]
    };

    const nodeFormBackdrop = document.getElementById("nodeFormBackdrop");
    const nodeForm = document.getElementById("nodeForm");
    const nodeFormTitle = document.getElementById("nodeFormTitle");
    const nodeFormName = document.getElementById("nodeFormName");
    const nodeFormType = document.getElementById("nodeFormType");
    const nodeFormGender = document.getElementById("nodeFormGender");
    const nodeFormLabel = document.getElementById("nodeFormLabel");
    const nodeFormTypeField = document.getElementById("nodeFormTypeField");
    const nodeFormGenderField = document.getElementById("nodeFormGenderField");
    const nodeFormLabelField = document.getElementById("nodeFormLabelField");
    const nodeFormSubmit = document.getElementById("nodeFormSubmit");
    let nodeFormResolver = null;
    let nodeFormConfig = null;

    function cloneData(source) {
      return JSON.parse(JSON.stringify(source));
    }

    function imageToSvgDataUri(file) {
      const MAX_SIZE = 240;
      return new Promise((resolve, reject) => {
        if (!file || !file.type?.startsWith("image/")) {
          reject(new Error("이미지 파일이 아닙니다."));
          return;
        }

        const img = new Image();
        const url = URL.createObjectURL(file);

        img.onload = () => {
          const ratio = Math.min(1, MAX_SIZE / Math.max(img.width, img.height));
          const w = Math.max(1, Math.round(img.width * ratio));
          const h = Math.max(1, Math.round(img.height * ratio));

          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext("2d");
          if (!ctx) {
            URL.revokeObjectURL(url);
            reject(new Error("Canvas를 생성할 수 없습니다."));
            return;
          }
          ctx.drawImage(img, 0, 0, w, h);
          const base64 = canvas.toDataURL("image/jpeg", 0.84);

          const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
              <defs>
                <style>*{shape-rendering:geometricPrecision}</style>
              </defs>
              <rect width="${w}" height="${h}" rx="${Math.min(w, h) / 2}" fill="#0f172a"/>
              <image x="0" y="0" width="${w}" height="${h}" href="${base64}" preserveAspectRatio="xMidYMid slice"/>
            </svg>`;

          const svgUri = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg.trim());
          URL.revokeObjectURL(url);
          resolve(svgUri);
        };

        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("이미지를 로드할 수 없습니다."));
        };

        img.src = url;
      });
    }

    function normalizePayload(parsed) {
      if (!parsed || typeof parsed !== "object") return null;
      if (parsed.tree && parsed.tree.id) {
        return migrateTreePayload(parsed);
      }
      if (parsed.id) {
        return migrateTreePayload({ version: 1, layoutMode: "vertical", tree: parsed });
      }
      return null;
    }

    function migrateTreePayload(payload) {
      if (!payload || !payload.tree) return payload;
      const migrateNode = (node) => {
        if (!node || typeof node !== "object") return node;
        const next = { ...node };
        if (next.type === "human" && !next.gender) next.gender = "M";
        if (!next.id) next.id = `m_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
        if (!Array.isArray(next.children)) next.children = [];
        return next;
      };
      const walk = (node) => {
        const current = migrateNode(node);
        const list = Array.isArray(current.children) ? current.children : [];
        current.children = list.map(walk);
        return current;
      };
      return {
        ...payload,
        layoutMode: payload.layoutMode || "vertical",
        tree: walk(payload.tree)
      };
    }

    function getPersistPayload(tree) {
      return {
        version: 2,
        layoutMode,
        tree: treeToObject(tree || root)
      };
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return cloneData(defaultData);
        const payload = normalizePayload(JSON.parse(raw));
        if (!payload) return cloneData(defaultData);
        layoutMode = payload.layoutMode || "vertical";
        return payload.tree;
      } catch (e) {
        console.warn("저장 데이터를 읽지 못해 기본값을 사용합니다.", e);
        return cloneData(defaultData);
      }
    }

    function applyCollapsedState(d3Node, source) {
      if (!d3Node || !source) return;
      const shouldCollapse = source.collapsed === true;
      const sourceChildren = Array.isArray(source.children) ? source.children : [];
      const activeChildren = d3Node.children || [];
      activeChildren.forEach((child, index) => {
        applyCollapsedState(child, sourceChildren[index]);
      });
      if (shouldCollapse && activeChildren.length > 0) {
        d3Node._children = activeChildren;
        d3Node.children = null;
      }
      if (!shouldCollapse && d3Node._children) {
        const next = d3Node._children;
        next.forEach((child, index) => {
          applyCollapsedState(child, sourceChildren[index]);
        });
        d3Node.children = next;
        d3Node._children = null;
      }
    }

    function saveData(tree) {
      const data = treeToObject(tree || root);
      const makePayload = (inputTree) => getPersistPayloadFromTree(inputTree);
      const removeImages = (node) => {
        if (!node || typeof node !== "object") return;
        if (node.photo) node.photo = placeholder;
        if (Array.isArray(node.children)) node.children.forEach(removeImages);
      };

      let payload = makePayload(tree || root);
      let lastErr;

      for (let retry = 0; retry < MAX_STORAGE_TRY; retry++) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
          setStatus("저장됨");
          isDirty = false;
          return data;
        } catch (err) {
          lastErr = err;
          if (retry >= MAX_STORAGE_TRY - 1) break;

          if (retry === 0) {
            payload = cloneData(payload);
            removeImages(payload.tree);
            continue;
          }

          payload = cloneData(payload);
          payload.tree = { ...payload.tree, photo: placeholder };
          continue;
        }
      }

      console.warn("로컬 저장 실패", lastErr);
      setStatus("저장 실패 · 용량 부족 또는 브라우저 정책");
      throw lastErr;
    }

    function getPersistPayloadFromTree(treeOrPayload) {
      const tree = treeToObject(treeOrPayload);
      return {
        version: 2,
        layoutMode,
        tree
      };
    }

    function markDirty() {
      isDirty = true;
      setStatus("수정됨 · 자동저장 대기중");
      saveData(root);
      if (autoSaveTimer) {
        clearTimeout(autoSaveTimer);
      }
      autoSaveTimer = setTimeout(() => {
        if (!isDirty) return;
        saveData(root);
        isDirty = false;
      }, AUTOSAVE_DELAY_MS);
    }

    function flushAutoSave() {
      if (!isDirty) return;
      if (autoSaveTimer) {
        clearTimeout(autoSaveTimer);
        autoSaveTimer = null;
      }
      try {
        saveData(root);
        isDirty = false;
      } catch {
        console.warn("flushAutoSave 저장 실패");
      }
    }

    function treeToObject(treeNode) {
      const walk = (node) => {
        if (!node || !node.data) return null;
        const result = {
          id: node.data.id,
          type: node.data.type,
          gender: node.data.gender || "",
          name: node.data.name,
          photo: node.data.photo,
          collapsed: !!node._children,
          children: []
        };
      
        const list = Array.isArray(node.children) && node.children.length > 0
          ? node.children
          : (Array.isArray(node._children) ? node._children : []);
        for (const c of list) {
          const mapped = walk(c);
          if (mapped) result.children.push(mapped);
        }
        return result;
      };
      return walk(treeNode);
    }

    function setStatus(text) {
      document.getElementById("status").textContent = `${text} · 📱 핀치줌/드래그로 이동 · 노드 클릭: 접기/펼치기 · 더블클릭: 정보 수정`;
    }

    function updateUndoState() {
      const undoBtn = document.getElementById("undoBtn");
      if (undoBtn) undoBtn.disabled = history.length === 0;
    }

    function pushHistory() {
      history.push(JSON.stringify(treeToObject(root)));
      if (history.length > HISTORY_LIMIT) history.shift();
      updateUndoState();
    }

    function undoHistory() {
      if (history.length === 0) return;
      const prev = JSON.parse(history.pop());
      data = prev;
      replaceTree(prev, true);
      isDirty = true;
      markDirty();
      setStatus("이전 상태로 되돌렸습니다");
      updateUndoState();
    }

    function findNode(source, targetId) {
      if (!source) return null;
      if (source.id === targetId) return source;
      if (!Array.isArray(source.children)) return null;
      for (const child of source.children) {
        const found = findNode(child, targetId);
        if (found) return found;
      }
      return null;
    }

    function addChildToSelected() {
      const parentId = selectedNodeId || defaultData.id;
      addChildToNode(parentId);
    }

    function isLeaf(nodeData) {
      if (!nodeData) return false;
      const visibleChildren = nodeData.children || [];
      const hiddenChildren = nodeData._children || [];
      return visibleChildren.length + hiddenChildren.length === 0;
    }

    function normalizeGender(value) {
      const raw = `${value || ""}`.trim().toLowerCase();
      if (raw === "m" || raw === "남" || raw === "남자" || raw === "male" || raw === "♂") return "M";
      if (raw === "f" || raw === "여" || raw === "여자" || raw === "female" || raw === "♀") return "F";
      if (raw === "x" || raw === "intersex" || raw === "⚥") return "X";
      return "";
    }

    function getGenderBadge(data) {
      if (!data) return null;
      const normalized = normalizeGender(data.gender);
      if (!normalized) return null;
      if (normalized === "M") return { text: "♂", fill: "#0284c7", stroke: "#7dd3fc" };
      if (normalized === "F") return { text: "♀", fill: "#db2777", stroke: "#f9a8d4" };
      return { text: "⚥", fill: "#7c3aed", stroke: "#c4b5fd" };
    }

    function updateGenderBadge(selection) {
      selection.each(function (d) {
        const badge = getGenderBadge(d.data);
        const group = d3.select(this);
        group.style("display", badge ? null : "none");
        if (!badge) return;

        group.select("circle")
          .attr("fill", badge.fill)
          .attr("stroke", badge.stroke);

        group.select("text")
          .text(badge.text);
      });
    }

    function syncNodeFormFields() {
      const type = nodeFormType.value;
      const showGender = type !== "group" && (!nodeFormConfig || nodeFormConfig.showGender !== false);
      nodeFormGenderField.classList.toggle("hidden", !showGender);
      if (!showGender) nodeFormGender.value = "";
    }

    function closeNodeForm(result) {
      nodeFormBackdrop.classList.add("hidden");
      const resolver = nodeFormResolver;
      nodeFormResolver = null;
      nodeFormConfig = null;
      if (resolver) resolver(result);
    }

    function openNodeForm(config) {
      nodeFormConfig = config;
      nodeFormTitle.textContent = config.title || "노드 정보";
      nodeFormSubmit.textContent = config.submitLabel || "확인";

      nodeFormName.value = config.defaults?.name || "";
      nodeFormType.value = config.defaults?.type || "human";
      nodeFormGender.value = normalizeGender(config.defaults?.gender) || "M";
      nodeFormLabel.value = config.defaults?.label || "";

      nodeFormTypeField.classList.toggle("hidden", config.showType === false);
      nodeFormLabelField.classList.toggle("hidden", config.showLabel === false);
      nodeFormType.disabled = config.lockType === true;

      syncNodeFormFields();
      nodeFormBackdrop.classList.remove("hidden");
      requestAnimationFrame(() => nodeFormName.focus());

      return new Promise((resolve) => {
        nodeFormResolver = resolve;
      });
    }

    async function addChildToNode(parentId) {
      const currentTree = treeToObject(root);
      const parent = findNode(currentTree, parentId);
      if (!parent) {
        alert("선택된 노드를 찾을 수 없습니다.");
        return;
      }

      const formData = await openNodeForm({
        title: "자식 노드 추가",
        submitLabel: "추가",
        showType: true,
        showGender: true,
        showLabel: true,
        defaults: {
          name: "새 멤버",
          type: "human",
          gender: "M",
          label: "N"
        }
      });
      if (!formData) return;

      const name = formData.name || "새 멤버";
      const type = formData.type;
      const gender = type === "group" ? "" : (normalizeGender(formData.gender) || "M");
      const safeLabel = (formData.label || name.slice(0, 2) || "N").trim().slice(0, 2) || "N";

      const nextColor = Math.floor(Math.random() * 360);

      parent.children = parent.children || [];
      parent.children.push({
        id: `n_${Date.now()}_${Math.floor(Math.random() * 1000)}`,
        type,
        gender,
        name: name || "새 멤버",
        photo: avatarDataUri(safeLabel, nextColor),
        children: []
      });

      pushHistory();
      data = currentTree;
      replaceTree(currentTree, false);
      selectedNodeId = parent.id;
      markDirty();
      setStatus("노드 추가됨");
    }

    function replacePhotoOfSelectedNode(nextPhoto) {
      if (!selectedNodeId) {
        alert("먼저 노드를 선택해주세요.");
        return;
      }

      const currentTree = treeToObject(root);
      const target = findNode(currentTree, selectedNodeId);
      if (!target) {
        alert("선택된 노드를 찾지 못했습니다.");
        return;
      }

      target.photo = nextPhoto;
      pushHistory();
      replaceTree(currentTree, false);
      markDirty();
      setStatus("사진이 변경되었습니다.");
    }

    function removeNodeById(source, targetId) {
      if (!source || source.id === targetId) return false;
      if (!Array.isArray(source.children)) return false;

      for (let index = 0; index < source.children.length; index++) {
        const child = source.children[index];
        if (child.id === targetId) {
          const promotedChildren = Array.isArray(child.children) ? child.children : [];
          source.children.splice(index, 1, ...promotedChildren);
          return true;
        }
      }

      for (const child of source.children) {
        if (removeNodeById(child, targetId)) return true;
      }

      return false;
    }

    function removeSelectedNode() {
      if (!selectedNodeId || selectedNodeId === defaultData.id) {
        alert("루트는 삭제할 수 없습니다.");
        return;
      }
      if (!confirm("정말 삭제하시겠어요?\n하위 노드는 유지되고 위로 이어집니다.")) return;
      const next = treeToObject(root);
      const removed = removeNodeById(next, selectedNodeId);
      if (!removed) {
        alert("삭제할 노드를 찾지 못했습니다.");
        return;
      }
      pushHistory();
      data = next;
      selectedNodeId = defaultData.id;
      replaceTree(next, false);
      markDirty();
      setStatus("선택 노드 삭제됨 · 하위 노드는 유지됨");
    }

    function downloadJson() {
      const payload = getPersistPayload(root);
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "familycard.json";
      a.click();
      URL.revokeObjectURL(url);
      setStatus("JSON 다운로드됨");
    }

    let data = loadData();
    data = migrateTreePayload({ tree: data }).tree;
    let autoSaveTimer = null;
    let isDirty = false;
    let selectedNodeId = defaultData.id;
    let history = [];

    // --- 3) D3 + SVG 렌더러 ---
    const container = document.getElementById("tree");
    const svg = d3.select(container).append("svg")
      .attr("width", container.clientWidth)
      .attr("height", container.clientHeight)
      .style("touch-action", "none");

    const viewport = svg.append("g").attr("class", "viewport");

    const zoom = d3.zoom()
      .scaleExtent([0.25, 3])
      .on("zoom", (event) => viewport.attr("transform", event.transform));

    svg.call(zoom).on("dblclick.zoom", null);

    const NODE_R = 28;
    const NODE_GAP_X = 90;
    const NODE_GAP_Y = 170;
    const LAYOUT_LABELS = {
      horizontal: "좌우",
      vertical: "상하"
    };

    let root = d3.hierarchy(data);
    root.x0 = 0;
    root.y0 = 0;
    applyCollapsedState(root, data);

    function nodeKey(d) {
      return String(d.data.id).replace(/[^a-zA-Z0-9_-]/g, "_");
    }

    function getPoint(d) {
      if (layoutMode === "vertical") {
        return { x: d.x, y: d.y };
      }
      return { x: d.y, y: d.x };
    }

    function truncate(s, n) {
      if (!s) return "";
      return s.length > n ? s.slice(0, n - 1) + "…" : s;
    }

    function getScreenPoint(d) {
      if (!d) return { x: 0, y: 0 };
      if (typeof d._sx === "number" && typeof d._sy === "number") {
        return { x: d._sx, y: d._sy };
      }
      return getPoint(d);
    }

    function layoutScreenPoint(d, minAxis) {
      const p = getPoint(d);
      return {
        x: p.x - minAxis + 60,
        y: p.y + 60
      };
    }

    function getLinkPoints(link) {
      const s = getScreenPoint(link.source);
      const t = getScreenPoint(link.target);
      const dx = t.x - s.x;
      const dy = t.y - s.y;
      const len = Math.max(1, Math.hypot(dx, dy));
      const ux = dx / len;
      const uy = dy / len;
      return {
        sx: s.x + ux * NODE_R,
        sy: s.y + uy * NODE_R,
        tx: t.x - ux * NODE_R,
        ty: t.y - uy * NODE_R
      };
    }

    function diagonal(link) {
      const p = getLinkPoints(link);
      if (layoutMode === "vertical") {
        return `M${p.sx},${p.sy}
                C${p.sx},${(p.sy + p.ty) / 2}
                 ${p.tx},${(p.sy + p.ty) / 2}
                 ${p.tx},${p.ty}`;
      }
      return `M${p.sx},${p.sy}
              C${(p.sx + p.tx) / 2},${p.sy}
               ${(p.sx + p.tx) / 2},${p.ty}
               ${p.tx},${p.ty}`;
    }

    function toggle(d) {
      if (d.children) {
        d._children = d.children;
        d.children = null;
      } else {
        d.children = d._children;
        d._children = null;
      }
    }

    async function editNodeName(d) {
      const formData = await openNodeForm({
        title: "노드 정보 수정",
        submitLabel: "적용",
        showType: true,
        lockType: true,
        showGender: true,
        showLabel: false,
        defaults: {
          name: d.data.name,
          type: d.data.type || "human",
          gender: d.data.gender
        }
      });
      if (!formData) return;

      d.data.name = formData.name || d.data.name;
      if (d.data.type !== "group") {
        d.data.gender = normalizeGender(formData.gender);
      }
      update(d);
      markDirty();
    }

    let nodeClickTimer = null;
    function onNodeClick(event, d) {
      selectedNodeId = d.data.id;
      setStatus(`선택: ${d.data.name}`);
      if (nodeClickTimer) {
        clearTimeout(nodeClickTimer);
        nodeClickTimer = null;
      }
      nodeClickTimer = setTimeout(() => {
        toggle(d);
        update(d);
        nodeClickTimer = null;
      }, CLICK_TOGGLE_DELAY);
      event.stopPropagation();
    }

    function onNodeDblClick(event, d) {
      if (nodeClickTimer) {
        clearTimeout(nodeClickTimer);
        nodeClickTimer = null;
      }
      event.preventDefault();
      void editNodeName(d);
      event.stopPropagation();
    }

    function update(source) {
      const width = container.clientWidth;
      const height = container.clientHeight;
      svg.attr("width", width).attr("height", height);

      const layout = d3.tree().nodeSize([NODE_GAP_X, NODE_GAP_Y]);
      layout(root);

      const nodes = root.descendants();
      const links = root.links();

      const minAxis = d3.min(nodes, d => getPoint(d).x);
      nodes.forEach((d) => {
        const p = layoutScreenPoint(d, minAxis);
        d._sx = p.x;
        d._sy = p.y;
      });

      const linkSel = viewport.selectAll("path.link").data(links, d => `${nodeKey(d.source)}_${nodeKey(d.target)}`);
      linkSel.enter()
        .append("path")
        .attr("class", "link")
        .attr("d", () => {
          const p = getScreenPoint(source);
          return `M${p.x},${p.y} C${p.x},${p.y} ${p.x},${p.y} ${p.x},${p.y}`;
        })
        .merge(linkSel)
        .transition().duration(350)
        .attr("d", diagonal);

      linkSel.exit()
        .transition().duration(350)
        .attr("d", () => diagonal({ source: { x: source.x, y: source.y }, target: { x: source.x, y: source.y } }))
        .remove();

      const nodeSel = viewport.selectAll("g.node").data(nodes, d => nodeKey(d));
      const nodeEnter = nodeSel.enter()
        .append("g")
        .attr("class", "node")
        .attr("transform", () => {
          const p = getScreenPoint(source);
          return `translate(${p.x},${p.y})`;
        })
        .on("click", onNodeClick)
        .on("dblclick", onNodeDblClick);

      nodeEnter.append("circle")
        .attr("class", "node-border")
        .attr("r", NODE_R + 2);

      const defs = nodeEnter.append("defs");
      defs.append("clipPath")
        .attr("id", d => `clip-${nodeKey(d)}`)
        .append("circle")
        .attr("r", NODE_R)
        .attr("cx", 0)
        .attr("cy", 0);

      nodeEnter.append("image")
        .attr("x", -NODE_R)
        .attr("y", -NODE_R)
        .attr("width", NODE_R * 2)
        .attr("height", NODE_R * 2)
        .attr("href", d => d.data.photo || placeholder)
        .attr("clip-path", d => `url(#clip-${nodeKey(d)})`)
        .each(function (d) {
          if (!d.data.photo) d3.select(this).attr("href", placeholder);
        });

      nodeEnter.append("text")
        .attr("class", "label")
        .attr("text-anchor", "middle")
        .attr("dy", NODE_R + 18)
        .text(d => truncate(d.data.name, 12));

      const genderBadgeEnter = nodeEnter.append("g")
        .attr("class", "gender-badge")
        .attr("transform", `translate(${NODE_R - 8},${-NODE_R + 8})`);

      genderBadgeEnter.append("circle")
        .attr("class", "gender-badge-bg")
        .attr("r", 10);

      genderBadgeEnter.append("text")
        .attr("class", "gender-badge-text")
        .attr("y", 0.5);

      const actionOffsetY = -NODE_R - 26;
      const actionOffsetX = -26;
      const addAction = nodeEnter.append("g")
        .attr("class", "action hidden")
        .attr("transform", `translate(${actionOffsetX},${actionOffsetY})`)
        .on("click", (event, d) => {
          event.preventDefault();
          event.stopPropagation();
          addChildToNode(d.data.id);
          setStatus(`${d.data.name}에 자식 노드를 추가합니다`);
        });
      addAction.append("circle")
        .attr("r", 11)
        .attr("class", "action-btn-bg");
      addAction.append("text")
        .attr("class", "action-btn-text")
        .attr("y", 0.5)
        .text("+");

      const delAction = nodeEnter.append("g")
        .attr("class", "action hidden")
        .attr("transform", `translate(${actionOffsetX + 28},${actionOffsetY})`)
        .on("click", (event, d) => {
          event.preventDefault();
          event.stopPropagation();
          selectedNodeId = d.data.id;
          removeSelectedNode();
        });
      delAction.append("circle")
        .attr("r", 11)
        .attr("class", "action-btn-bg");
      delAction.append("text")
        .attr("class", "action-btn-text")
        .attr("y", 0.5)
        .text("−");

      const nodeUpdate = nodeEnter.merge(nodeSel);
      nodeUpdate.transition().duration(350)
        .attr("transform", d => `translate(${d._sx},${d._sy})`);

      nodeUpdate.select("text.label")
        .text(d => truncate(d.data.name, 12));
      updateGenderBadge(nodeUpdate.select(".gender-badge"));

      nodeUpdate.select(".action")
        .classed("hidden", d => !(d.data.id === selectedNodeId) || !isLeaf(d.data))
        .attr("transform", d => {
          const isSelectedLeaf = d.data.id === selectedNodeId && isLeaf(d.data);
          const x = isSelectedLeaf ? -26 : 0;
          const y = isSelectedLeaf ? -NODE_R - 26 : 0;
          return `translate(${x},${y})`;
        });

      nodeUpdate.selectAll(".action").each(function (d) {
        const g = d3.select(this);
        if (d.data.id === selectedNodeId && isLeaf(d.data)) {
          g.classed("hidden", false);
          g.style("opacity", 1);
        } else {
          g.style("opacity", 0.2);
          if (!g.classed("hidden")) g.classed("hidden", true);
        }
      });

      nodeUpdate.select("circle.node-border")
        .classed("has-children", d => !!(d.children || d._children))
        .classed("selected", d => d.data.id === selectedNodeId);

      nodeSel.exit()
        .transition().duration(350)
        .attr("transform", () => {
          const p = getScreenPoint(source);
          return `translate(${p.x},${p.y})`;
        })
        .remove();

      nodes.forEach(d => {
        const p = getScreenPoint(d);
        d.x0 = p.x;
        d.y0 = p.y;
      });
    }

    function toggleLayout() {
      layoutMode = layoutMode === "horizontal" ? "vertical" : "horizontal";
      updateLayoutButtonText();
      setStatus(`보기 방향: ${LAYOUT_LABELS[layoutMode]}`);
      update(root);
      fitToScreen();
      markDirty();
    }

    function updateLayoutButtonText() {
      const btn = document.getElementById("layoutBtn");
      if (!btn) return;
      btn.textContent = `방향: ${LAYOUT_LABELS[layoutMode]}`;
    }

    function fitToScreen() {
      const gNode = viewport.node();
      if (!gNode) return;

      const bbox = gNode.getBBox();
      const width = container.clientWidth;
      const height = container.clientHeight;
      if (bbox.width === 0 || bbox.height === 0) return;

      const scale = Math.min(3, Math.max(0.25, 0.92 / Math.max(bbox.width / width, bbox.height / height)));
      const tx = (width - bbox.width * scale) / 2 - bbox.x * scale;
      const ty = (height - bbox.height * scale) / 2 - bbox.y * scale;

      svg.transition().duration(350)
        .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }

    function replaceTree(nextData, keepDirty = false) {
      root = d3.hierarchy(nextData);
      applyCollapsedState(root, nextData);
      root.x0 = 0;
      root.y0 = 0;
      update(root);
      fitToScreen();
      isDirty = keepDirty ? isDirty : false;
      if (autoSaveTimer) {
        clearTimeout(autoSaveTimer);
        autoSaveTimer = null;
      }
    }

    document.getElementById("fitBtn").addEventListener("click", fitToScreen);
    document.getElementById("layoutBtn").addEventListener("click", toggleLayout);
    document.getElementById("addBtn").addEventListener("click", addChildToSelected);
    document.getElementById("removeBtn").addEventListener("click", removeSelectedNode);
    document.getElementById("uploadBtn").addEventListener("click", () => {
      if (!selectedNodeId) {
        alert("사진을 바꿀 노드를 먼저 선택해주세요.");
        return;
      }

      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.onchange = async () => {
        const file = input.files && input.files[0];
        if (!file) return;
        try {
          const svgPhoto = await imageToSvgDataUri(file);
          replacePhotoOfSelectedNode(svgPhoto);
        } catch (e) {
          console.warn(e);
          alert("이미지 업로드에 실패했습니다.");
        }
      };
      input.click();
    });
    document.getElementById("undoBtn").addEventListener("click", undoHistory);
    document.getElementById("saveBtn").addEventListener("click", () => saveData(root));
    document.getElementById("downloadBtn").addEventListener("click", downloadJson);
    document.getElementById("importBtn").addEventListener("click", () => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = ".json,application/json";
      input.onchange = () => {
        const file = input.files && input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const parsed = normalizePayload(JSON.parse(String(e.target?.result || "{}")));
            if (!parsed) throw new Error("invalid payload");
            history = [];
            layoutMode = parsed.layoutMode || "vertical";
            updateLayoutButtonText();
            replaceTree(parsed.tree);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
            isDirty = false;
            if (autoSaveTimer) {
              clearTimeout(autoSaveTimer);
              autoSaveTimer = null;
            }
            setStatus("JSON 불러옴");
          } catch {
            alert("JSON 형식이 올바르지 않습니다.");
          }
        };
        reader.readAsText(file);
      };
      input.click();
    });
    document.getElementById("clearLocalBtn").addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      history = [];
      data = cloneData(defaultData);
      replaceTree(data);
      layoutMode = "vertical";
      updateLayoutButtonText();
      isDirty = false;
      if (autoSaveTimer) {
        clearTimeout(autoSaveTimer);
        autoSaveTimer = null;
      }
      setStatus("로컬 저장소 초기화됨");
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      svg.transition().duration(350).call(zoom.transform, d3.zoomIdentity);
    });

    document.addEventListener("keydown", (event) => {
      if (!nodeFormBackdrop.classList.contains("hidden") && event.key === "Escape") {
        event.preventDefault();
        closeNodeForm(null);
        return;
      }
      if (event.key.toLowerCase() !== "v") return;
      const tag = event.target && event.target.tagName ? event.target.tagName.toLowerCase() : "";
      if (tag === "input" || tag === "textarea" || tag === "select") return;
      event.preventDefault();
      toggleLayout();
    });

    nodeFormType.addEventListener("change", syncNodeFormFields);
    nodeForm.addEventListener("submit", (event) => {
      event.preventDefault();
      closeNodeForm({
        name: nodeFormName.value.trim(),
        type: nodeFormType.value,
        gender: nodeFormGender.value,
        label: nodeFormLabel.value.trim()
      });
    });
    document.getElementById("nodeFormCancel").addEventListener("click", () => closeNodeForm(null));
    nodeFormBackdrop.addEventListener("click", (event) => {
      if (event.target === nodeFormBackdrop) closeNodeForm(null);
    });

    updateLayoutButtonText();
    update(root);
    setTimeout(fitToScreen, 0);

    window.addEventListener("resize", () => {
      update(root);
      fitToScreen();
    });

    window.addEventListener("click", () => {
      if (data && data.id === "root") {
        selectedNodeId = data.id;
      }
    });

    window.addEventListener("beforeunload", () => {
      flushAutoSave();
    });
    window.addEventListener("pagehide", () => {
      flushAutoSave();
    });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") {
        flushAutoSave();
      }
    });

    updateUndoState();
  </script>
</body>
</html>
