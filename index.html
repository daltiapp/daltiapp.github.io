  <script>
    function getPreferredLanguage() {
      const urlLang = new URLSearchParams(window.location.search).get("lang");
      if (urlLang) return urlLang.toLowerCase();

      if (navigator.languages && navigator.languages.length > 0) {
        return navigator.languages[0].toLowerCase();
      }

      return (navigator.language || "en").toLowerCase();
    }

    function detectLang(lang) {
      if (lang === "zh-cn" || lang === "zh-sg" || lang === "zh-hans") return "zh-Hans";
      if (lang === "zh-tw" || lang === "zh-hk" || lang === "zh-mo" || lang === "zh-hant") return "zh-Hant";
      if (lang === "pt-br") return "pt-BR";
      if (lang === "en-us") return "en-US";
      if (lang === "es-419") return "es-419";
      if (lang === "fr-ca") return "fr-CA";

      if (lang.startsWith("ko")) return "ko";
      if (lang.startsWith("ja")) return "ja";
      if (lang.startsWith("hi")) return "hi";
      if (lang.startsWith("id")) return "id";
      if (lang.startsWith("bn")) return "bn";
      if (lang.startsWith("ur")) return "ur";
      if (lang.startsWith("vi")) return "vi";
      if (lang.startsWith("th")) return "th";
      if (lang.startsWith("ms")) return "ms";
      if (lang.startsWith("fil")) return "fil";
      if (lang.startsWith("zh")) return "zh-Hans";
      if (lang.startsWith("en")) return "en";
      if (lang.startsWith("de")) return "de";
      if (lang.startsWith("fr")) return "fr";
      if (lang.startsWith("es")) return "es";
      if (lang.startsWith("pt")) return "pt-BR";
      if (lang.startsWith("ar")) return "ar";
      if (lang.startsWith("fa")) return "fa";
      if (lang.startsWith("he")) return "he";

      return "en";
    }

    const rawLang = getPreferredLanguage();
    const selected = detectLang(rawLang);
    const content = text[selected] || text.en;

    document.documentElement.lang = selected;

    if (["ar", "fa", "he", "ur"].includes(selected)) {
      document.documentElement.dir = "rtl";
      document.body.style.textAlign = "center";
    }

    document.getElementById("desc1").textContent = content.desc1;
    document.getElementById("desc2").textContent = content.desc2;
    document.getElementById("contact").textContent = content.contact;
    document.getElementById("privacy").textContent = content.privacy;
