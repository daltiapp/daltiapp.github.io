<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dalti Developer</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f9fafb;
      color: #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      margin: 0;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    img.logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 1rem;
      object-fit: cover;
    }

    h1 {
      font-size: 2rem;
      margin: 0 0 0.5rem;
      line-height: 1.2;
      font-weight: 700;
    }

    p {
      color: #4b5563;
      margin: 0.25rem 0;
      line-height: 1.6;
      word-break: keep-all;
    }

    a {
      text-decoration: none;
    }

    .store-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .store-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 160px;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .store-button:hover {
      transform: translateY(-2px);
    }

    .apple {
      background: #000;
      color: #fff;
    }

    .google {
      background: #34A853;
      color: #fff;
    }

    .privacy {
      margin-top: 1.25rem;
      font-size: 0.95rem;
    }

    .privacy a {
      color: #2563eb;
    }

    .privacy a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #9ca3af;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0f172a;
        color: #f8fafc;
      }

      p {
        color: #cbd5e1;
      }

      .apple {
        background: #ffffff;
        color: #000000;
      }

      .google {
        background: #34A853;
        color: #ffffff;
      }

      .privacy a {
        color: #60a5fa;
      }

      footer {
        color: #64748b;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="dalti_logo.png" alt="Dalti App Logo" class="logo" />

    <h1>Dalti Developer</h1>

    <p id="desc1"></p>
    <p id="desc2"></p>
    <p id="contact"></p>

    <!-- Store Buttons -->
    <div class="store-buttons">

      <a
        href="https://apps.apple.com/us/developer/sangil-jeon/id1507362656"
        target="_blank"
        rel="noopener noreferrer"
        class="store-button apple"
      >
        🍎 App Store
      </a>

      <a
        href="https://play.google.com/store/apps/dev?id=6842858747814742652"
        target="_blank"
        rel="noopener noreferrer"
        class="store-button google"
      >
        ▶ Google Play
      </a>

    </div>

    <!-- Privacy -->
    <p class="privacy">
      🔒
      <a
        href="https://sites.google.com/view/dalti"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span id="privacy"></span>
      </a>
    </p>

    <footer>
      © 2026 Dalti. All rights reserved.
    </footer>

  </div>

  <script>
    function getPreferredLanguage() {
      const urlLang = new URLSearchParams(window.location.search).get("lang");

      if (urlLang) {
        return urlLang.toLowerCase();
      }

      if (navigator.languages && navigator.languages.length > 0) {
        return navigator.languages[0].toLowerCase();
      }

      return (navigator.language || "en").toLowerCase();
    }

    function detectLang(lang) {

      if (lang === "zh-cn" || lang === "zh-sg" || lang === "zh-hans") {
        return "zh-Hans";
      }

      if (lang === "zh-tw" || lang === "zh-hk" || lang === "zh-mo" || lang === "zh-hant") {
        return "zh-Hant";
      }

      if (lang === "pt-br") {
        return "pt-BR";
      }

      if (lang.startsWith("ko")) return "ko";
      if (lang.startsWith("ja")) return "ja";
      if (lang.startsWith("hi")) return "hi";
      if (lang.startsWith("id")) return "id";
      if (lang.startsWith("bn")) return "bn";
      if (lang.startsWith("ur")) return "ur";
      if (lang.startsWith("vi")) return "vi";
      if (lang.startsWith("th")) return "th";
      if (lang.startsWith("ms")) return "ms";
      if (lang.startsWith("fil")) return "fil";
      if (lang.startsWith("zh")) return "zh-Hans";
      if (lang.startsWith("en")) return "en";
      if (lang.startsWith("de")) return "de";
      if (lang.startsWith("fr")) return "fr";
      if (lang.startsWith("es")) return "es";
      if (lang.startsWith("pt")) return "pt-BR";
      if (lang.startsWith("ar")) return "ar";
      if (lang.startsWith("fa")) return "fa";
      if (lang.startsWith("he")) return "he";

      return "en";
    }

    const text = {

      ko: {
        desc1: "빠르고 심플한 유틸리티 앱 개발팀",
        desc2: "사진 · PDF · 파일 작업을 더 쉽고 빠르게",
        contact: "문의: dalti.app@gmail.com",
        privacy: "개인정보 처리방침"
      },

      en: {
        desc1: "Fast & Simple Utility Apps",
        desc2: "Make photo, PDF, and file tasks easier and faster",
        contact: "Contact: dalti.app@gmail.com",
        privacy: "Privacy Policy"
      },

      ja: {
        desc1: "シンプルで高速なユーティリティアプリ",
        desc2: "写真・PDF・ファイル作業をもっと簡単に",
        contact: "お問い合わせ: dalti.app@gmail.com",
        privacy: "プライバシーポリシー"
      },

      "zh-Hans": {
        desc1: "快速简洁的实用工具应用",
        desc2: "让照片、PDF 和文件处理更加轻松高效",
        contact: "联系方式: dalti.app@gmail.com",
        privacy: "隐私政策"
      },

      "zh-Hant": {
        desc1: "快速簡潔的工具應用",
        desc2: "讓照片、PDF 與檔案處理更加輕鬆",
        contact: "聯絡方式: dalti.app@gmail.com",
        privacy: "隱私政策"
      },

      hi: {
        desc1: "तेज़ और सरल यूटिलिटी ऐप्स",
        desc2: "फोटो, PDF और फ़ाइल कार्यों को आसान बनाएं",
        contact: "संपर्क: dalti.app@gmail.com",
        privacy: "गोपनीयता नीति"
      }
    };

    const rawLang = getPreferredLanguage();
    const selected = detectLang(rawLang);
    const content = text[selected] || text.en;

    document.documentElement.lang = selected;

    if (["ar", "fa", "he", "ur"].includes(selected)) {
      document.documentElement.dir = "rtl";
    }

    document.getElementById("desc1").textContent = content.desc1;
    document.getElementById("desc2").textContent = content.desc2;
    document.getElementById("contact").textContent = content.contact;
    document.getElementById("privacy").textContent = content.privacy;
  </script>
</body>
</html>
