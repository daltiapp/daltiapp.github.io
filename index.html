<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dalti Developer</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f5f7;
      --text: #0f172a;
      --sub: #5b6472;
      --border: rgba(15, 23, 42, 0.08);
      --glass: rgba(255, 255, 255, 0.72);
      --glass-hover: rgba(255, 255, 255, 0.9);
      --footer: #9ca3af;
      --link: #2563eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --sub: #cbd5e1;
        --border: rgba(255,255,255,0.08);
        --glass: rgba(30, 41, 59, 0.72);
        --glass-hover: rgba(30, 41, 59, 0.95);
        --footer: #64748b;
        --link: #60a5fa;
      }
    }

    body {
      margin: 0;
      padding: 24px;

      min-height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      background: var(--bg);

      color: var(--text);

      font-family:
        "Pretendard",
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "Segoe UI",
        sans-serif;

      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    .logo {
      width: 108px;
      height: 108px;

      border-radius: 28px;

      object-fit: cover;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.05);

      margin-bottom: 28px;
    }

    h1 {
      margin: 0;

      font-size: clamp(3rem, 8vw, 4.2rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
      font-weight: 800;

      color: var(--text);
    }

    .subtitle {
      margin-top: 24px;

      font-size: 1.05rem;
      line-height: 1.7;

      color: var(--sub);
      font-weight: 600;
    }

    .subtitle p {
      margin: 0;
    }

    .subtitle p + p {
      margin-top: 8px;
    }

    .contact {
      margin-top: 22px;

      font-size: 1rem;
      line-height: 1.6;

      color: var(--sub);
      font-weight: 600;
    }

    .store-buttons {
      margin-top: 34px;

      display: flex;
      justify-content: center;
      gap: 14px;

      flex-wrap: wrap;
    }

    .store-button {
      height: 56px;
      min-width: 180px;

      padding: 0 22px;

      border-radius: 20px;

      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      text-decoration: none;

      background: var(--glass);

      border: 1px solid var(--border);

      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      color: var(--text);

      font-size: 1rem;
      font-weight: 700;

      transition:
        transform 0.18s ease,
        background 0.18s ease,
        border-color 0.18s ease;
    }

    .store-button:hover {
      transform: translateY(-1px);

      background: var(--glass-hover);
    }

    .store-icon {
      font-size: 1.15rem;
    }

    .privacy {
      margin-top: 26px;

      font-size: 1rem;
      font-weight: 600;
    }

    .privacy a {
      color: var(--link);
      text-decoration: none;
    }

    .privacy a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 44px;

      color: var(--footer);

      font-size: 0.92rem;
      font-weight: 600;
    }

    @media (max-width: 480px) {

      .store-button {
        width: 100%;
      }

      h1 {
        font-size: 3rem;
      }

    }
  </style>
</head>

<body>

  <div class="container">

    <img
      src="dalti_logo.png"
      alt="Dalti Logo"
      class="logo"
    />

    <h1>Dalti Developer</h1>

    <div class="subtitle">
      <p id="desc1"></p>
      <p id="desc2"></p>
    </div>

    <div class="contact" id="contact"></div>

    <div class="store-buttons">

      <a
        href="https://apps.apple.com/us/developer/sangil-jeon/id1507362656"
        target="_blank"
        rel="noopener noreferrer"
        class="store-button"
      >
        <span class="store-icon"></span>
        <span>App Store</span>
      </a>

      <a
        href="https://play.google.com/store/apps/dev?id=6842858747814742652"
        target="_blank"
        rel="noopener noreferrer"
        class="store-button"
      >
        <span class="store-icon">▶</span>
        <span>Google Play</span>
      </a>

    </div>

    <div class="privacy">
      🔒
      <a
        href="https://sites.google.com/view/dalti"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span id="privacy"></span>
      </a>
    </div>

    <footer>
      © 2026 Dalti. All rights reserved.
    </footer>

  </div>

  <script>

    function getPreferredLanguage() {

      const urlLang =
        new URLSearchParams(window.location.search).get("lang");

      if (urlLang) {
        return urlLang.toLowerCase();
      }

      if (
        navigator.languages &&
        navigator.languages.length > 0
      ) {
        return navigator.languages[0].toLowerCase();
      }

      return (navigator.language || "en").toLowerCase();
    }

    function detectLang(lang) {

      if (
        lang === "zh-cn" ||
        lang === "zh-sg" ||
        lang === "zh-hans"
      ) {
        return "zh-Hans";
      }

      if (
        lang === "zh-tw" ||
        lang === "zh-hk" ||
        lang === "zh-mo" ||
        lang === "zh-hant"
      ) {
        return "zh-Hant";
      }

      if (lang.startsWith("ko")) return "ko";
      if (lang.startsWith("ja")) return "ja";
      if (lang.startsWith("zh")) return "zh-Hans";
      if (lang.startsWith("hi")) return "hi";

      return "en";
    }

    const text = {

      ko: {
        desc1: "빠르고 심플한 유틸리티 앱 개발팀",
        desc2: "사진 · PDF · 파일 작업을 더 쉽고 빠르게",
        contact: "문의 · dalti.app@gmail.com",
        privacy: "개인정보 처리방침"
      },

      en: {
        desc1: "Fast & Simple Utility Apps",
        desc2: "Make photo, PDF, and file tasks easier and faster",
        contact: "Contact · dalti.app@gmail.com",
        privacy: "Privacy Policy"
      },

      ja: {
        desc1: "高速でシンプルなユーティリティアプリ",
        desc2: "写真・PDF・ファイル作業をもっと簡単に",
        contact: "お問い合わせ · dalti.app@gmail.com",
        privacy: "プライバシーポリシー"
      },

      "zh-Hans": {
        desc1: "快速简洁的实用工具应用",
        desc2: "让照片、PDF 和文件处理更加轻松高效",
        contact: "联系 · dalti.app@gmail.com",
        privacy: "隐私政策"
      },

      "zh-Hant": {
        desc1: "快速簡潔的工具應用",
        desc2: "讓照片、PDF 與檔案處理更加輕鬆",
        contact: "聯絡 · dalti.app@gmail.com",
        privacy: "隱私政策"
      },

      hi: {
        desc1: "तेज़ और सरल यूटिलिटी ऐप्स",
        desc2: "फोटो, PDF और फ़ाइल कार्यों को आसान बनाएं",
        contact: "संपर्क · dalti.app@gmail.com",
        privacy: "गोपनीयता नीति"
      }

    };

    const rawLang = getPreferredLanguage();

    const selected = detectLang(rawLang);

    const content =
      text[selected] || text.en;

    document.documentElement.lang = selected;

    document.getElementById("desc1").textContent =
      content.desc1;

    document.getElementById("desc2").textContent =
      content.desc2;

    document.getElementById("contact").textContent =
      content.contact;

    document.getElementById("privacy").textContent =
      content.privacy;

  </script>

</body>
</html>
